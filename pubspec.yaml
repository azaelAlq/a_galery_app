name: a_galery_app
description: 'A new Flutter project.'
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Auth
  firebase_auth: ^6.5.3
  firebase_core: ^4.11.0
  google_sign_in: ^7.2.0

  # State management
  provider: ^6.1.5+1

  # HTTP / Networking
  http: ^1.2.2

  # Local storage
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.3
  video_compress: ^3.1.3

  # UI
  cached_network_image: ^3.4.1
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
